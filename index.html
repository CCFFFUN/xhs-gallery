            opacity: 0.8;
            line-height: 1.6;

            overflow: hidden;
            text-overflow: ellipsis;

            display: flex;
            gap: 15px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .stat {
            font-size: 12px;
            opacity: 0.7;
        }
        .stat span {
            color: #ffd700;
            font-weight: 600;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal.active {
            display: flex;
        }
        .modal-images {
            display: flex;
            gap: 10px;
            max-width: 90%;
            flex-wrap: wrap;
            justify-content: center;
        }
        .modal-images img {
            max-width: 200px;
            max-height: 200px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .modal-images img:hover {
            transform: scale(1.1);
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 30px;
            cursor: pointer;
            z-index: 1001;

        .modal-info {

            bottom: 20px;

        function openModal(index) {
            const item = data[index];
            const modalImages = document.getElementById('modal-images');
            const modalInfo = document.getElementById('modal-info');
            
            modalImages.innerHTML = item.images.map(img => `<img src="${img}" alt="">`).join('');
            modalInfo.innerHTML = `
                <div class="card-title">${item.title}</div>
                <div class="card-author">👤 ${item.author}</div>
                <div class="card-keywords" style="max-height:none;margin-top:10px;">${item.keywords}</div>
            `;
            
            document.getElementById('modal').classList.add('active');
        }

        function closeModal(event) {
            if (event.target.classList.contains('modal') || event.target.classList.contains('modal-close')) {
                document.getElementById('modal').classList.remove('active');
            }
        }

        // ESC close
        document.addEventListener('keydown', function(e) {
