<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书猫箱画册 v3</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; }
        .header { background: rgba(255,255,255,0.1); padding: 20px; text-align: center; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.1); border-radius: 16px; overflow: hidden; }
        .card-images { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 10px; background: rgba(0,0,0,0.2); }
        .card-images img { width: 100%; height: 100px; object-fit: cover; border-radius: 6px; }
        .card-content { padding: 15px; }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: #ffd700; }
        .card-author { font-size: 12px; opacity: 0.7; margin-bottom: 10px; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .tag { background: rgba(255,215,0,0.2); color: #ffd700; padding: 4px 10px; border-radius: 12px; font-size: 11px; }
        .card-stats { display: flex; gap: 15px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        .stat { font-size: 12px; opacity: 0.7; }
        .stat span { color: #ffd700; font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐸 小红书猫箱画册 v3 (jsdelivr)</h1>
    </div>
    <div class="gallery" id="gallery"></div>
    <script>
    const base = "https://cdn.jsdelivr.net/gh/CCFFFUN/xhs-gallery@main/images/";
    const data = [
    {
        "title": "4.0关键词｜大概是年上",
        "author": "知无竹0485",
        "time": "4天前",
        "tags": ["#猫箱捏崽", "#AI绘画有点东西", "#猫箱AI"],
        "likes": 83,
        "collects": 39,
        "images": ["img1_1.jpg","img1_2.jpg","img1_3.jpg","img1_4.jpg","img1_5.jpg","img1_6.jpg","img1_7.jpg"]
    },
    {
        "title": "猫箱｜3.0关键词",
        "author": "豆荚猫",
        "time": "01-16",
        "tags": ["#猫箱捏崽", "#猫箱AI"],
        "likes": 197,
        "collects": 74,
        "images": ["img2_1.jpg","img2_2.jpg","img2_3.jpg","img2_4.jpg","img2_5.jpg"]
    }];
    document.getElementById('gallery').innerHTML = data.map(item => 
        '<div class="card"><div class="card-images">'+
        item.images.map(img=>`<img src="${base}${img}">`).join('')+
        '</div><div class="card-content"><div class="card-title">'+item.title+'</div><div class="card-author">👤 '+item.author+' · '+item.time+'</div><div class="card-tags">'+
        item.tags.map(t=>`<span class="tag">${t}</span>`).join('')+'</div><div class="card-stats"><div class="stat">👍 <span>'+item.likes+'</span></div><div class="stat">⭐ <span>'+item.collects+'</span></div></div></div></div>'
    ).join('');
    </script>
</body>
</html>
