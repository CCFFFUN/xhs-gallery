    function renderGallery() {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = data.map((item, index) => `
            <div class="card">
                <div class="card-images" onclick="openModal(${index})">
                    ${item.images.slice(0,6).map(img => `<img src="${base}${img}" alt="">`).join('')}
                    ${item.images.length > 6 ? `<img src="${base}${item.images[6]}" alt="">` : ''}
                </div>
                <div class="card-content">
                    <div class="card-title">${item.title}</div>
                    <div class="card-author">👤 ${item.author} · ${item.time}</div>
                    <div class="card-tags">
                        ${item.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                    <div class="card-keywords">${item.keywords || ''}</div>
                    <div class="card-stats">
                        <div class="stat">👍 <span>${item.likes}</span></div>
                        <div class="stat">⭐ <span>${item.collects}</span></div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function openModal(index) {
        const item = data[index];
        const modalImages = document.getElementById('modal-images');
        const modalInfo = document.getElementById('modal-info');
        
        modalImages.innerHTML = item.images.map(img => `<img src="${base}${img}" alt="">`).join('');
        modalInfo.innerHTML = `
            <div class="card-title">${item.title}</div>
            <div class="card-author">👤 ${item.author}</div>
            <div class="card-keywords" style="max-height:none;margin-top:10px;">${item.keywords || ''}</div>
        `;
        
        document.getElementById('modal').classList.add('active');
    }

    function closeModal(event) {
        if (event.target.classList.contains('modal') || event.target.classList.contains('modal-close')) {
            document.getElementById('modal').classList.remove('active');
        }
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            document.getElementById('modal').classList.remove('active');
        }
    });
