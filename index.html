<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书猫箱画册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; }
        .header { background: rgba(255,255,255,0.1); padding: 20px; text-align: center; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.1); border-radius: 16px; overflow: hidden; }
        .card-images { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 10px; background: rgba(0,0,0,0.2); }
        .card-images img { width: 100%; height: 100px; object-fit: cover; border-radius: 6px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; padding: 40px; flex-wrap: wrap; justify-content: center; align-content: center; gap: 10px; overflow: auto; }
        .modal.show { display: flex; }
        .modal img { max-width: 250px; max-height: 350px; object-fit: contain; border-radius: 8px; }
        .modal-close { position: fixed; top: 15px; right: 20px; color: #fff; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header"><h1>🐸 小红书猫箱画册</h1></div>
    <div class="gallery" id="gallery"></div>
    <div class="modal" id="modal" onclick="document.getElementById('modal').classList.remove('show')">
        <span class="modal-close" onclick="document.getElementById('modal').classList.remove('show')">&times;</span>
        <div id="modal-images"></div>
    </div>
    <script>
    const base = "https://cdn.jsdelivr.net/gh/CCFFFUN/xhs-gallery@main/images/";
    const data = [
    {title: "4.0关键词｜大概是年上", author: "知无竹0485", time: "4天前", tags: ["#猫箱捏崽","#AI绘画有点东西","#猫箱AI"], likes: 83, collects: 39, images: ["img1_1.jpg","img1_2.jpg","img1_3.jpg","img1_4.jpg","img1_5.jpg","img1_6.jpg","img1_7.jpg"]},
    {title: "猫箱｜3.0关键词", author: "豆荚猫", time: "01-16", tags: ["#猫箱捏崽","#猫箱AI"], likes: 197, collects: 74, images: ["img2_1.jpg","img2_2.jpg","img2_3.jpg","img2_4.jpg","img2_5.jpg"]},
    {title: "词条分享｜油画质感", author: "momo", time: "2025-10-18", tags: ["#AI画图","#ai","#猫箱","#猫箱AI"], likes: 23, collects: 13, images: ["img3_1.jpg","img3_2.jpg","img3_3.jpg","img3_4.jpg"]}
    ];
    function showImages(idx){var imgs=data[idx].images;document.getElementById('modal-images').innerHTML=imgs.map(i=>`<img src="${base}${i}">`).join('');document.getElementById('modal').classList.add('show');}
    document.getElementById('gallery').innerHTML=data.map(function(d,i){return'<div class="card"><div class="card-images">'+d.images.slice(0,6).map(function(img){return'<img src="'+base+img+'" onclick="showImages('+i+')">';}).join('')+'</div><div class="card-content"><div class="card-title">'+d.title+'</div><div class="card-author">👤 '+d.author+' · '+d.time+'</div><div class="card-tags">'+d.tags.map(function(t){return'<span style="background:rgba(255,215,0,0.2);color:#ffd700;padding:4px 10px;border-radius:12px;font-size:11px;margin-right:5px;">'+t+'</span>';}).join('')+'</div><div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.1);font-size:12px;opacity:0.7;">👍 <span style="color:#ffd700;font-weight:600;">'+d.likes+'</span> &nbsp;⭐ <span style="color:#ffd700;font-weight:600;">'+d.collects+'</span></div></div></div>';}).join('');
    </script>
</body>
</html>
