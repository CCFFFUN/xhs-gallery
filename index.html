<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书猫箱捏崽关键词画册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; }
        .header { background: rgba(255,255,255,0.1); padding: 20px; text-align: center; backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        .header p { opacity: 0.7; font-size: 14px; }
        .refresh-btn { background: linear-gradient(135deg, #ffd700, #ffaa00); border: none; padding: 10px 20px; border-radius: 20px; color: #1a1a2e; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .refresh-btn:hover { transform: scale(1.05); }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: rgba(255,255,255,0.1); border-radius: 16px; overflow: hidden; backdrop-filter: blur(10px); transition: transform 0.3s, box-shadow 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .card-images { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 10px; background: rgba(0,0,0,0.2); }
        .card-images img { width: 100%; height: 100px; object-fit: cover; border-radius: 6px; cursor: pointer; transition: opacity 0.3s, transform 0.3s; }
        .card-images img:hover { opacity: 0.8; transform: scale(1.05); }
        .card-content { padding: 15px; }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: #ffd700; }
        .card-author { font-size: 12px; opacity: 0.7; margin-bottom: 10px; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .tag { background: rgba(255,215,0,0.2); color: #ffd700; padding: 4px 10px; border-radius: 12px; font-size: 11px; }
        .card-keywords { font-size: 12px; opacity: 0.8; line-height: 1.6; max-height: 80px; overflow: hidden; text-overflow: ellipsis; }
        .card-stats { display: flex; gap: 15px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        .stat { font-size: 12px; opacity: 0.7; }
        .stat span { color: #ffd700; font-weight: 600; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .modal.active { display: flex; }
        .modal-images { display: flex; gap: 10px; max-width: 90%; flex-wrap: wrap; justify-content: center; }
        .modal-images img { max-width: 200px; max-height: 200px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: transform 0.3s; }
        .modal-images img:hover { transform: scale(1.1); }
        .modal-close { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 30px; cursor: pointer; z-index: 1001; }
        .modal-info { position: absolute; bottom: 20px; left: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐸 小红书猫箱捏崽关键词画册</h1>
        <p>点击图片查看大图 · 数据自动更新</p>
        <button class="refresh-btn" onclick="loadData()">🔄 刷新数据</button>
    </div>
    <div class="gallery" id="gallery"></div>
    
    <div class="modal" id="modal" onclick="closeModal(event)">
        <span class="modal-close" onclick="closeModal(event)">&times;</span>
        <div class="modal-images" id="modal-images"></div>
        <div class="modal-info" id="modal-info"></div>
    </div>

    <script>
        // 自动从同目录的 data.json 加载数据
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                renderGallery(data);
            } catch (e) {
                // 如果加载失败，尝试从GitHub Raw加载（部署时用）
                try {
                    const response = await fetch('https://raw.githubusercontent.com/YOUR_GITHUB/xhs-gallery/main/data.json');
                    const data = await response.json();
                    renderGallery(data);
                } catch (e2) {
                    document.getElementById('gallery').innerHTML = '<p style="text-align:center;padding:40px;">数据加载失败，请刷新页面</p>';
                }
            }
        }

        function renderGallery(data) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = data.map((item, index) => `
                <div class="card">
                    <div class="card-images" onclick="openModal(${index})">
                        ${item.images.slice(0,6).map(img => `<img src="${img}" alt="">`).join('')}
                        ${item.images.length > 6 ? `<img src="${item.images[6]}" alt="">` : ''}
                    </div>
                    <div class="card-content">
                        <div class="card-title">${item.title}</div>
                        <div class="card-author">👤 ${item.author} · ${item.time}</div>
                        <div class="card-tags">
                            ${item.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        <div class="card-keywords">${item.keywords}</div>
                        <div class="card-stats">
                            <div class="stat">👍 <span>${item.likes}</span></div>
                            <div class="stat">⭐ <span>${item.collects}</span></div>
                            <div class="stat">💬 <span>${item.comments}</span></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        let currentData = [];

        function openModal(index) {
            const item = data[index];
            const modalImages = document.getElementById('modal-images');
            const modalInfo = document.getElementById('modal-info');
            
            modalImages.innerHTML = item.images.map(img => `<img src="${img}" alt="">`).join('');
            modalInfo.innerHTML = `
                <div class="card-title">${item.title}</div>
                <div class="card-author">👤 ${item.author}</div>
                <div class="card-keywords" style="max-height:none;margin-top:10px;">${item.keywords}</div>
            `;
            
            document.getElementById('modal').classList.add('active');
        }

        function closeModal(event) {
            if (event.target.classList.contains('modal') || event.target.classList.contains('modal-close')) {
                document.getElementById('modal').classList.remove('active');
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('modal').classList.remove('active');
            }
        });

        // 页面加载时自动读取数据
        loadData();
    </script>
</body>
</html>
